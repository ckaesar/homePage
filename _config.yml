title: 个人博客主页
name: 我的博客
description: 记录技术、随笔与生活点滴
locale: zh-CN
timezone: Asia/Shanghai

remote_theme: mmistakes/minimal-mistakes

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate

paginate: 5
paginate_path: "/page:num/"

minimal_mistakes_skin: default

author:
  name: 坐井说天客
  avatar: null
  bio: 本是后山人，偶做前堂客。醉舞经阁半卷书，坐井说天阔。大志戏功名，海斗量福祸。论到囊中羞涩时，怒指乾坤错。
  location: China
  links:
    - label: GitHub
      icon: "fab fa-github"
      url: https://github.com/
    - label: Email
      icon: "fas fa-envelope"
      url: mailto:example@example.com

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
